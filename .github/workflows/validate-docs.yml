name: Documentation Validation

on:
  pull_request:
    paths:
      - 'docs/**'
  push:
    branches:
      - main
    paths:
      - 'docs/**'

jobs:
  validate-structure:
    name: Validate Documentation Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check folder structure
        run: |
          # Stage all docs files for validation
          git add docs/ 2>/dev/null || true
          node scripts/enforce-folder-structure.js

      - name: Validate task numbering
        run: node scripts/validate-task-numbers.js

      - name: Check baseline mutations
        run: |
          git add docs/ 2>/dev/null || true
          node scripts/check-baseline-mutations.js

      - name: Lint markdown files
        run: |
          npm install -g markdownlint-cli2
          markdownlint-cli2 "docs/**/*.md" --config .markdownlint.json || true

      - name: Check for broken links
        run: |
          npm install -g markdown-link-check
          find docs -name "*.md" -exec markdown-link-check {} \; || true

  validate-content:
    name: Validate Documentation Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check ADR format
        run: |
          # Verify all ADRs have required fields
          for file in docs/decisions/ADR-*.md; do
            if [ -f "$file" ]; then
              if ! grep -q "**Status**:" "$file"; then
                echo "❌ Missing Status field in $file"
                exit 1
              fi
              if ! grep -q "**Date**:" "$file"; then
                echo "❌ Missing Date field in $file"
                exit 1
              fi
            fi
          done
          echo "✅ All ADRs have required fields"

      - name: Check Task format
        run: |
          # Verify all tasks have required fields
          for file in docs/tasks/task-*.md; do
            if [ -f "$file" ]; then
              if ! grep -q "**Status**:" "$file"; then
                echo "❌ Missing Status field in $file"
                exit 1
              fi
              if ! grep -q "## Objective" "$file"; then
                echo "❌ Missing Objective section in $file"
                exit 1
              fi
            fi
          done
          echo "✅ All tasks have required fields"
